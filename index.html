<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RDR Vulnerabilidades</title>
  <style>
    * { box-sizing: border-box; }
    
    :root {
      --accent: #00b4d8; /* Bright Turquoise */
      --accent-dark: #0077b6; /* Deep Blue-Turquoise */
      --accent-soft: #90e0ef; /* Very Soft Light Turquoise */
      --good: #06d6a0; /* Bubbly Turquoise Green */
      --warn: #ffd166; /* Bright soft yellow */
      --bad: #ef476f; /* Bubbly vibrant red */
      --bg: #eef6f6; /* Very clean turquoise tinted background */
      --panel: #ffffff;
      --line: rgba(0, 180, 216, 0.15);
      --muted: #6c8c96; /* Soft gray teal */
      --ink: #03045e; /* Deep blue text */
      --radius-bubble: 24px;
      --radius-card: 16px;
      --radius-pill: 99px;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    .header {
      background: linear-gradient(135deg, #005f73, #0a9396, #94d2bd);
      color: white;
      padding: 20px 30px;
      box-shadow: 0 8px 30px rgba(10, 147, 150, 0.25);
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
      border-bottom-left-radius: 20px;
      border-bottom-right-radius: 20px;
    }

    .header h1 {
      margin: 0;
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .header-actions {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .status-indicator {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      padding: 8px 16px;
      border-radius: var(--radius-pill);
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(5px);
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #94a3b8;
    }

    .status-dot.syncing { background: var(--warn); animation: pulse 1s infinite alternate; }
    .status-dot.connected { background: var(--good); }
    .status-dot.disconnected { background: var(--bad); }

    @keyframes pulse {
      from { opacity: 0.4; }
      to { opacity: 1; }
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: var(--radius-pill);
      font-size: 0.9rem;
      cursor: pointer;
      font-weight: 700;
      transition: all 250ms cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }

    .btn-refresh {
      background: white;
      color: #0a9396;
    }

    .btn-refresh:hover {
      background: var(--accent-soft);
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(10, 147, 150, 0.3);
    }

    .container {
      max-width: 1900px;
      margin: 0 auto;
      padding: 24px;
    }

    .filter-bar {
      margin-bottom: 24px;
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-bar input, .filter-bar select {
      padding: 12px 18px;
      border: 1.5px solid var(--line);
      border-radius: var(--radius-pill);
      background: white;
      color: var(--ink);
      font-size: 0.9rem;
      outline: none;
      box-shadow: 0 4px 10px rgba(0, 180, 216, 0.04);
      transition: all 200ms ease;
    }

    .filter-bar input::placeholder {
      color: var(--muted);
    }

    .filter-bar input:focus, .filter-bar select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0, 180, 216, 0.15);
    }

    .swimlane {
      margin-bottom: 30px;
      background: var(--panel);
      border-radius: var(--radius-bubble);
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0, 119, 182, 0.05);
      border: 1.5px solid var(--line);
    }

    .swimlane-header {
      background: linear-gradient(90deg, rgba(0, 180, 216, 0.05), transparent);
      padding: 18px 24px;
      border-bottom: 2px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .swimlane-title {
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--accent-dark);
      margin: 0;
      padding-left: 12px;
    }

    .swimlane-info {
      font-size: 0.9rem;
      color: var(--muted);
      display: flex;
      gap: 15px;
      align-items: center;
    }

    .progress-indicator {
      width: 120px;
      height: 10px;
      background: rgba(0, 180, 216, 0.1);
      border-radius: var(--radius-pill);
      overflow: hidden;
      border: 1px solid rgba(0, 180, 216, 0.15);
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--good), var(--accent));
      width: 0%;
      border-radius: var(--radius-pill);
      transition: width 350ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    .columns-wrapper {
      display: flex;
      gap: 15px;
      padding: 20px;
      overflow-x: auto;
      background: #f8fbfb;
    }

    .column {
      flex: 0 0 280px;
      border-radius: var(--radius-card);
      padding: 15px;
      border: 2px dashed var(--line);
      min-height: 420px;
      display: flex;
      flex-direction: column;
      transition: all 200ms ease;
    }

    /* Distinct Bubbly Colors per Column */
    .column-initial {
      background: rgba(0, 180, 216, 0.03);
      border-color: rgba(0, 180, 216, 0.15);
    }
    .column-tests-regresivos {
      background: rgba(139, 92, 246, 0.03);
      border-color: rgba(139, 92, 246, 0.15);
    }
    .column-maven {
      background: rgba(236, 72, 153, 0.03);
      border-color: rgba(236, 72, 153, 0.15);
    }
    .column-jdk17 {
      background: rgba(245, 158, 11, 0.03);
      border-color: rgba(245, 158, 11, 0.15);
    }
    .column-tests-compilado {
      background: rgba(59, 130, 246, 0.03);
      border-color: rgba(59, 130, 246, 0.15);
    }
    .column-vulnerabilidades {
      background: rgba(239, 68, 68, 0.03);
      border-color: rgba(239, 68, 68, 0.15);
    }
    .column-completed {
      background: rgba(6, 214, 160, 0.06);
      border-color: rgba(6, 214, 160, 0.25);
      border-style: solid;
    }

    .column-header {
      font-weight: 800;
      font-size: 0.85rem;
      color: var(--ink);
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 2.5px solid var(--line);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .column-count {
      background: rgba(255, 255, 255, 0.8);
      padding: 2px 10px;
      border-radius: var(--radius-pill);
      font-size: 0.8rem;
      color: var(--accent-dark);
      font-weight: 700;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }

    .cards-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 100px;
    }

    .card {
      background: white;
      border: 1.5px solid rgba(0, 180, 216, 0.1);
      border-radius: var(--radius-card);
      padding: 15px;
      cursor: pointer; /* Clickable now to open modal! */
      transition: all 250ms cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 4px 10px rgba(0, 119, 182, 0.03);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card.risk-high-card { border-left: 5px solid var(--bad); }
    .card.risk-medium-card { border-left: 5px solid var(--warn); }
    .card.risk-low-card { border-left: 5px solid var(--good); }

    .card:hover {
      box-shadow: 0 10px 20px rgba(0, 180, 216, 0.12);
      transform: translateY(-4px) scale(1.01);
    }

    .card.dragging {
      opacity: 0.3;
      transform: scale(0.95);
    }

    .card-header {
      font-weight: 800;
      font-size: 0.95rem;
      color: var(--ink);
      line-height: 1.3;
    }

    .tag {
      display: inline-block;
      padding: 5px 12px;
      border-radius: var(--radius-pill);
      font-size: 0.72rem;
      font-weight: 750;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      line-height: 1;
      align-self: flex-start;
    }

    .tag-tech {
      background: rgba(0, 180, 216, 0.05);
      color: var(--accent-dark);
      border: 1px solid rgba(0, 180, 216, 0.15);
    }

    .risk-high { background: var(--bad); color: white; box-shadow: 0 2px 6px rgba(239, 71, 111, 0.3); }
    .risk-medium { background: var(--warn); color: #03045e; box-shadow: 0 2px 6px rgba(255, 209, 102, 0.3); }
    .risk-low { background: var(--good); color: white; box-shadow: 0 2px 6px rgba(6, 214, 160, 0.3); }

    .card-meta {
      font-size: 0.8rem;
      color: var(--muted);
      padding: 8px 12px;
      background: rgba(0, 180, 216, 0.03);
      border-radius: 10px;
      line-height: 1.4;
      border: 1px solid rgba(0, 180, 216, 0.05);
      font-weight: 500;
    }

    .column-empty {
      color: var(--muted);
      font-size: 0.85rem;
      text-align: center;
      padding: 30px 8px;
      opacity: 0.5;
      font-style: italic;
    }

    /* Modal styling */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(7, 34, 39, 0.6);
      backdrop-filter: blur(5px);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .modal-content {
      background: white;
      border: 1px solid var(--line);
      width: 100%;
      max-width: 550px;
      border-radius: var(--radius-bubble);
      box-shadow: 0 20px 40px rgba(7, 34, 39, 0.25);
      display: flex;
      flex-direction: column;
      max-height: 90vh;
      animation: modalFade 0.2s ease;
      border-top: 6px solid transparent;
      overflow: hidden;
    }

    .modal-content.risk-high-modal { border-top-color: var(--bad); }
    .modal-content.risk-medium-modal { border-top-color: var(--warn); }
    .modal-content.risk-low-modal { border-top-color: var(--good); }

    @keyframes modalFade {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    /* Rockets Animation */
    .rocket-container {
      position: fixed;
      bottom: -100px;
      z-index: 2000;
      pointer-events: none;
      filter: drop-shadow(0 10px 15px rgba(0,0,0,0.15));
    }

    @keyframes flyUp {
      0% {
        transform: translateY(0) rotate(var(--rotate, -15deg)) scale(0.5);
        opacity: 0;
      }
      15% {
        opacity: 1;
      }
      85% {
        opacity: 1;
      }
      100% {
        transform: translateY(-125vh) rotate(var(--rotate, -15deg)) scale(1.4);
        opacity: 0;
      }
    }

    .modal-header {
      padding: 20px 25px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-title {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--ink);
    }

    .modal-close {
      font-size: 24px;
      cursor: pointer;
      color: var(--muted);
      background: none;
      border: none;
      padding: 5px;
    }

    .modal-close:hover {
      color: var(--ink);
    }

    .modal-body {
      padding: 25px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
      font-size: 0.9rem;
    }

    .modal-meta-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .modal-meta-card {
      background: rgba(0, 180, 216, 0.03);
      border: 1.5px solid var(--line);
      padding: 12px;
      border-radius: var(--radius-card);
    }

    .modal-meta-card strong {
      display: block;
      font-size: 1.15rem;
      color: var(--ink);
      margin-bottom: 2px;
    }

    .modal-meta-card span {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      font-weight: 600;
    }

    .modal-section-title {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      font-weight: 750;
      margin-bottom: 10px;
      border-bottom: 1.5px solid var(--line);
      padding-bottom: 4px;
    }

    .vuln-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .vuln-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #f7fbfb;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      transition: all 150ms ease;
    }

    .vuln-item:hover {
      border-color: var(--accent);
      background: #eefdfd;
    }

    .vuln-item input[type="checkbox"] {
      cursor: pointer;
      width: 16px;
      height: 16px;
      accent-color: var(--good);
    }

    .vuln-item span {
      flex: 1;
      font-weight: 550;
      color: var(--ink);
    }

    .vuln-item.checked span {
      text-decoration: line-through;
      color: var(--muted);
    }

    .btn-delete-vuln {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      color: var(--bad);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px;
      border-radius: 4px;
    }

    .btn-delete-vuln:hover {
      background: rgba(239, 71, 111, 0.1);
    }

    .add-vuln-form {
      display: flex;
      gap: 8px;
      margin-top: 5px;
    }

    .add-vuln-form input[type="text"] {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid var(--line);
      border-radius: var(--radius-pill);
      outline: none;
      font-family: inherit;
    }

    .add-vuln-form input[type="text"]:focus {
      border-color: var(--accent);
    }

    .add-vuln-form button {
      background: #008080;
      color: white;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--good);
      color: white;
      padding: 14px 22px;
      border-radius: var(--radius-card);
      box-shadow: 0 8px 24px rgba(6, 214, 160, 0.3);
      animation: slideIn 300ms ease, slideOut 300ms ease 3700ms;
      z-index: 1000;
      font-weight: 700;
    }

    @keyframes slideIn { from { transform: translateX(400px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes slideOut { to { transform: translateX(400px); opacity: 0; } }
  </style>
</head>

    // Set visual syncing indicator
    function setSyncState(state, message) {
      const dot = document.getElementById('syncDot');
      const text = document.getElementById('syncText');
      dot.className = 'status-dot ' + state;
      text.textContent = message;

    // Load state from Google Sheets
    async function loadData() {
      if (!SCRIPT_URL || SCRIPT_URL.includes("TU_GOOGLE_APPS_SCRIPT")) {
        console.warn("Google Sheets API URL not configured. Falling back to local state.");
        document.getElementById('loadingOverlay').style.display = 'none';
        setSyncState('disconnected', 'Modo Local');
        initLocalData();
        renderBoard();
        checkAllCompleted(true);
        return;
      }

      setSyncState('syncing', 'Sincronizando...');
      document.getElementById('loadingOverlay').style.display = 'flex';
      document.getElementById('loadingText').innerHTML = '<div class="spinner"></div><div style="margin-top:10px;">Descargando estado desde Google Sheets...</div>';

      try {
        const response = await fetch(SCRIPT_URL + "?action=read");
        if (!response.ok) throw new Error("HTTP error " + response.status);
        
        const sheetData = await response.json();
        
        projects = JSON.parse(JSON.stringify(initialProjects));
        
        const sheetMap = {};
        sheetData.forEach(row => {
          if (row.projectId !== '__CONFIG__COLUMNS__') {
            sheetMap[row.projectId] = row;
          }
        });

        // Map sheet data back to projects
        projects.forEach(p => {
          const row = sheetMap[p.id];
          if (row) {
            p.currentList = row.listId;
            // Parse custom vulnerabilities checklist from JSON string
            if (row.checklist && row.checklist.trim().startsWith('[')) {
              try {
                p.checklist = JSON.parse(row.checklist);
              } catch(e) {
                p.checklist = [];
              }
            } else {
              p.checklist = [];
            }
          } else {
            p.currentList = COLUMNS[0].id;
            p.checklist = [];
          }
        });

        setSyncState('connected', 'Sincronizado');
        document.getElementById('loadingOverlay').style.display = 'none';
        showToast('🔄 Datos actualizados de Google Sheets');
        renderBoard();

        // Re-render open modal if active
        if (activeProjectId) {
          openModal(activeProjectId);
        }

        // Check if all projects are completed on load
        checkAllCompleted(true);

      } catch (err) {
        console.error("Failed to fetch from Google Sheets:", err);
        setSyncState('disconnected', 'Usando Local (Sin Conexión)');
        document.getElementById('loadingText').innerHTML = 
          "<span style='color:var(--bad); font-weight:700;'>Error de conexión con Google Sheets</span><br>" +
          "<span style='font-size:12px; color:var(--muted);'>" + err.message + "</span><br><br>" +
          "<button onclick='bypassToLocal()' class='btn btn-refresh' style='background:var(--accent-dark);color:white;'>Continuar sin conexión</button>";
      }
    }

    function bypassToLocal() {
      document.getElementById('loadingOverlay').style.display = 'none';
      initLocalData();
      renderBoard();
      checkAllCompleted(true);
    }

    function initLocalData() {
      const savedState = localStorage.getItem('exact_board_local_fallback');
      if (savedState) {
        try {
          projects = JSON.parse(savedState);
        } catch(e) {
          projects = JSON.parse(JSON.stringify(initialProjects));
        }
      } else {
        projects = JSON.parse(JSON.stringify(initialProjects));
      }
    }

    function saveLocalState() {
      localStorage.setItem('exact_board_local_fallback', JSON.stringify(projects));
    }

    // Sync card updates to Sheets
    async function syncCard(p) {
      if (!SCRIPT_URL || SCRIPT_URL.includes("TU_GOOGLE_APPS_SCRIPT")) {
        saveLocalState();
        return;
      }

      setSyncState('syncing', 'Guardando...');
      
      const checklistStr = JSON.stringify(p.checklist || []);
      const updateUrl = SCRIPT_URL + 
        "?action=update" +
        "&projectId=" + encodeURIComponent(p.id) +
        "&listId=" + encodeURIComponent(p.currentList) +
        "&checklist=" + encodeURIComponent(checklistStr); 

      try {
        const response = await fetch(updateUrl, { method: 'GET', keepalive: true });
        if (!response.ok) throw new Error("HTTP error " + response.status);
        setSyncState('connected', 'Sincronizado');
        updateSwimlaneProgress(p.process);
      } catch (err) {
        console.error("Failed to sync card:", err);
        setSyncState('disconnected', 'Error de conexión');
      }
    }

    // Drag and Drop variables
    let draggedCardId = null;

    function drag(event) {
      draggedCardId = event.target.dataset.id;
      event.target.classList.add('dragging');
      event.stopPropagation();
    }

    function dragEnd(event) {
      event.target.classList.remove('dragging');
      event.stopPropagation();
    }

    function allowDrop(event) {
      event.preventDefault();
    }

    function drop(event, processId, targetListId) {
      event.preventDefault();
      if (!draggedCardId) return;

      const project = projects.find(p => p.id === draggedCardId);
      if (project && project.process === processId && project.currentList !== targetListId) {
        const wasCompleted = project.currentList === 'completed';
        const isCompleted = targetListId === 'completed';

        project.currentList = targetListId;
        renderBoard();
        syncCard(project);

        if (isCompleted && !wasCompleted) {
          launchRockets();
          checkAllCompleted(false);
        }
      }
      draggedCardId = null;
    }

    // Check if all projects are completed on load or drop
    function checkAllCompleted(isFromLoad = false) {
      if (projects.length === 0) return;
      const totalCompleted = projects.filter(p => p.currentList === 'completed').length;
      if (totalCompleted === projects.length) {
        if (isFromLoad) {
          showToast("🎉 ¡Enhorabuena! Todos los proyectos están completados. Haz clic en la pantalla para celebrarlo.");
          document.addEventListener('click', triggerScreamer, { once: true });
        } else {
          setTimeout(triggerScreamer, 2000);
        }
      }
    }

    function triggerScreamer() {
      console.log("triggerScreamer() ejecutado");

      const video = document.getElementById('screamerVideo');
      if (!overlay || !video) {
        console.error("No se encontró el overlay o el video en el DOM:", { overlay: !!overlay, video: !!video });

      console.log("Mostrando overlay del screamer...");
      overlay.style.display = 'flex';
      video.currentTime = 0;
      
      // Remove old backup play button if exists
      const oldBtn = document.getElementById('screamerPlayBtn');
      if (oldBtn) {
        console.log("Removiendo botón de play anterior");

      console.log("Llamando a video.play()...");
      video.play()
        .then(() => {
          console.log("Video reproducido correctamente");

        .catch(err => {
          console.warn("La reproducción automática fue bloqueada por el navegador. Mostrando botón de respaldo:", err);

            video.play().catch(e2 => console.error("Error al reproducir tras clic:", e2));

    // Celebration Rockets!
    function launchRockets() {
      const rocketIcons = ['🚀', '✨', '🎉', '💥', '🚀'];
      for (let i = 0; i < 8; i++) {
        setTimeout(() => {
          const rocket = document.createElement('div');
          rocket.className = 'rocket-container';
          rocket.textContent = rocketIcons[Math.floor(Math.random() * rocketIcons.length)];
          rocket.style.left = (10 + Math.random() * 80) + 'vw';
          
          const size = 2.5 + Math.random() * 2.5; // 2.5rem to 5rem
          const rotate = -25 + Math.random() * 50; // -25deg to 25deg
          const duration = 1.6 + Math.random() * 1.2; // 1.6s to 2.8s
          
          rocket.style.fontSize = size + 'rem';
          rocket.style.setProperty('--rotate', rotate + 'deg');
          rocket.style.animation = 'flyUp ' + duration + 's cubic-bezier(0.1, 0.8, 0.3, 1) forwards';
          
          document.body.appendChild(rocket);
          
          setTimeout(() => {
            rocket.remove();
          }, duration * 1000);
        }, i * 180); // Staggered launch!
      }
    }

    function updateSwimlaneProgress(processId) {
      const blockProjects = projects.filter(p => p.process === processId);
      if (blockProjects.length === 0) return;

      let totalProgressPoints = 0;
      const maxPointsPerCard = COLUMNS.length - 1; // 6 points (from index 0 to 6)

      blockProjects.forEach(p => {
        const colIdx = COLUMNS.findIndex(c => c.id === p.currentList);
        totalProgressPoints += (colIdx >= 0 ? colIdx : 0);
      });

      const maxPossiblePoints = blockProjects.length * maxPointsPerCard;
      const percentage = Math.round((totalProgressPoints / maxPossiblePoints) * 100);

      const completedListId = COLUMNS[COLUMNS.length - 1].id;
      const completedCount = blockProjects.filter(p => p.currentList === completedListId).length;
      
      const bar = document.getElementById("progress-bar-" + processId);
      const text = document.getElementById("progress-text-" + processId);
      if (bar && text) {
        bar.style.width = percentage + "%";
        text.textContent = percentage + "% progreso (" + completedCount + "/" + blockProjects.length + " completados)";
      }
    }

    function renderVulnerabilitiesList(p) {
      const listEl = document.getElementById('vulnList');
      listEl.innerHTML = '';

      if (!p.checklist || p.checklist.length === 0) {
        listEl.innerHTML = '<li style="font-style:italic; color:var(--muted); padding:10px 0;">No se han listado vulnerabilidades. Añade una abajo.</li>';
        return;
      }

      p.checklist.forEach((item, idx) => {
        const li = document.createElement('li');
        li.className = 'vuln-item ' + (item.done ? 'checked' : '');
        li.innerHTML = 
          '<input type="checkbox" ' + (item.done ? 'checked' : '') + ' onchange="toggleVulnerability(' + idx + ')">' +
          '<span>' + item.text + '</span>' +
          '<button class="btn-delete-vuln" onclick="deleteVulnerability(' + idx + ')" title="Eliminar">🗑️</button>';
        listEl.appendChild(li);
      });
    }

    function addVulnerability() {
      const input = document.getElementById('newVulnInput');
      const text = input.value.trim();
      if (!text) return;

      const p = projects.find(proj => proj.id === activeProjectId);
      if (p) {
        if (!p.checklist) p.checklist = [];
        p.checklist.push({ text, done: false });
        input.value = '';
        renderVulnerabilitiesList(p);
        renderBoard();
        syncCard(p);
      }
    }

    function toggleVulnerability(idx) {
      const p = projects.find(proj => proj.id === activeProjectId);
      if (p && p.checklist && p.checklist[idx]) {
        p.checklist[idx].done = !p.checklist[idx].done;
        renderVulnerabilitiesList(p);
        renderBoard();
        syncCard(p);
      }
    }

    function deleteVulnerability(idx) {
      const p = projects.find(proj => proj.id === activeProjectId);
      if (p && p.checklist && p.checklist[idx]) {
        p.checklist.splice(idx, 1);
        renderVulnerabilitiesList(p);
        renderBoard();
        syncCard(p);
      }
    }

    function filterSwimlanes() {
      const search = document.getElementById('searchFilter').value.toLowerCase();
      const risk = document.getElementById('filterRisk').value;
      const selectedProcess = document.getElementById('filterSwimlane').value;
      
      const swimlanes = document.querySelectorAll('.swimlane');
      swimlanes.forEach(sl => {
        const processId = sl.dataset.process;
        const matchesProcess = (selectedProcess === 'all' || processId === selectedProcess);
        
        const cards = sl.querySelectorAll('.card');
        let hasMatches = false;
        
        cards.forEach(card => {
          const name = card.dataset.name.toLowerCase();
          const cardRisk = card.dataset.risk;
          const matchesSearch = name.includes(search);
          const matchesRisk = risk === 'all' || cardRisk === risk;
          
          if (matchesSearch && matchesRisk) {
            card.style.display = 'flex';
            hasMatches = true;
          } else {
            card.style.display = 'none';
          }
        });

        const emptyDivs = sl.querySelectorAll('.column-empty');
        emptyDivs.forEach(ed => {
          ed.style.display = (search !== '' || risk !== 'all') ? 'none' : 'block';
        });

        const isFiltering = (search !== '' || risk !== 'all');
        sl.style.display = matchesProcess && (!isFiltering || hasMatches) ? 'block' : 'none';
      });
    }

    // Render Board
    function renderBoard() {
      const container = document.getElementById('swimlanes-container');
      container.innerHTML = '';

      // Initialize missing project categories
      projects.forEach(p => {
        const colExists = COLUMNS.some(c => c.id === p.currentList);
        if (!p.currentList || !colExists) {
          p.currentList = COLUMNS[0].id;
        }
      });

      // Render Swimlanes
      PROCESSES.forEach(proc => {
        const processProjects = projects.filter(p => p.process === proc.id);
        
        if (processProjects.length === 0) return;

        const swimlane = document.createElement('div');
        swimlane.className = 'swimlane';
        swimlane.dataset.process = proc.id;

        // Header
        const header = document.createElement('div');
        header.className = 'swimlane-header';

        const titleInfo = document.createElement('div');
        titleInfo.style.flex = '1';

        const titleText = document.createElement('h3');
        titleText.className = 'swimlane-title';
        titleText.style.borderLeft = '5px solid ' + proc.color;
        titleText.textContent = proc.name;
        titleInfo.appendChild(titleText);

        const info = document.createElement('div');
        info.className = 'swimlane-info';

        const totalEffort = processProjects.reduce((sum, p) => sum + p.score, 0);
        const completedListId = COLUMNS[COLUMNS.length - 1].id;
        const completedCount = processProjects.filter(p => p.currentList === completedListId).length;

        info.innerHTML = 
          '<span id="progress-text-' + proc.id + '">' + completedCount + '/' + processProjects.length + ' completados</span>' +
          '<div class="progress-indicator">' +
            '<div class="progress-bar" id="progress-bar-' + proc.id + '"></div>' +
          '</div>' +
          '<span>Complejidad: ' + totalEffort.toFixed(1) + '</span>';
        
        titleInfo.appendChild(info);
        header.appendChild(titleInfo);
        swimlane.appendChild(header);

        // Columns Wrapper
        const columnsWrapper = document.createElement('div');
        columnsWrapper.className = 'columns-wrapper';

        COLUMNS.forEach(column => {
          const col = document.createElement('div');
          col.className = 'column column-' + column.id;
          col.dataset.column = column.id;
          col.dataset.process = proc.id;

          const colHeader = document.createElement('div');
          colHeader.className = 'column-header';
          
          const colProjects = processProjects.filter(p => p.currentList === column.id);

          colHeader.innerHTML = 
            '<span><span class="column-icon">' + column.icon + '</span>' + column.label + '</span>' +
            '<span class="column-count">' + colProjects.length + '</span>';
          col.appendChild(colHeader);

          const cardsContainer = document.createElement('div');
          cardsContainer.className = 'cards-container';
          cardsContainer.ondragover = allowDrop;
          cardsContainer.ondrop = (e) => drop(e, proc.id, column.id);

          if (colProjects.length === 0) {
            const empty = document.createElement('div');
            empty.className = 'column-empty';
            empty.textContent = '−';
            cardsContainer.appendChild(empty);
          } else {
            colProjects.forEach(p => {
              const card = document.createElement('div');
              card.className = 'card risk-' + p.risk + '-card';
              card.draggable = true;
              card.dataset.id = p.id;
              card.dataset.name = p.name;
              card.dataset.risk = p.risk;
              card.dataset.column = column.id;
              card.onclick = () => openModal(p.id); // Open modal on click!

              const cardHeader = document.createElement('div');
              cardHeader.className = 'card-header';
              cardHeader.textContent = p.name;

              // Tags
              const riskTagHtml = "<span class='tag risk-" + p.risk + "'>" + p.riskLabel.toUpperCase() + "</span>";
              
              // Vulnerabilities badge
              let vulnBadgeHtml = '';
              if (p.checklist && p.checklist.length > 0) {
                const total = p.checklist.length;
                const completed = p.checklist.filter(item => item.done).length;
                const badgeColor = (completed === total) ? 'rgba(6, 214, 160, 0.1)' : 'rgba(0, 180, 216, 0.05)';
                const textColor = (completed === total) ? 'var(--good)' : 'var(--accent-dark)';
                vulnBadgeHtml = '<span class="tag" style="background:' + badgeColor + '; color:' + textColor + '; font-weight:700;">🛡️ ' + completed + '/' + total + '</span>';
              }

              const tagsWrapper = document.createElement('div');
              tagsWrapper.className = 'card-tags';
              tagsWrapper.innerHTML = riskTagHtml + vulnBadgeHtml;

              const cardMeta = document.createElement('div');
              cardMeta.className = 'card-meta';
              cardMeta.innerHTML = 'Complejidad: ' + p.score.toFixed(1) + ' • ' + (p.hasPom ? '✓ Maven' : '✗ Sin Maven');

              card.appendChild(cardHeader);
              card.appendChild(tagsWrapper);
              card.appendChild(cardMeta);

              // Drag & drop listeners
              card.ondragstart = drag;
              card.ondragend = dragEnd;

              cardsContainer.appendChild(card);
            });
          }

          col.appendChild(cardsContainer);
          columnsWrapper.appendChild(col);
        });

        swimlane.appendChild(columnsWrapper);
        container.appendChild(swimlane);

        // Update progress bar
        updateSwimlaneProgress(proc.id);
      });
      // Re-apply filters after redrawing the board
      filterSwimlanes();
    }

    // Set event listeners
    document.getElementById('btnRefresh').addEventListener('click', loadData);

    // Close modal on click outside
    window.onclick = function(event) {
      const modal = document.getElementById('cardModal');
      if (event.target == modal) {
        closeModal();
      }
    }

    // Drag over document behavior
    document.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
    });

    document.addEventListener('drop', (e) => {
      e.preventDefault();
      const column = e.target.closest('.column');
      if (column) {
        const java = e.dataTransfer.getData('java') || draggedCardId;
        const fromColumn = e.dataTransfer.getData('fromColumn');
        const toColumn = column.getAttribute('data-column');
        const processId = column.getAttribute('data-process');
        
        const project = projects.find(p => p.id === java);
        if (project && project.process === processId && toColumn && project.currentList !== toColumn) {
          project.currentList = toColumn;
          renderBoard();
          syncCard(project);
        }
      }
      draggedCardId = null;
    });

    // Start
    loadData();

    // Developer backdoor: double-click the header to trigger screamer instantly for testing!
    const headerEl = document.querySelector('.header');
    if (headerEl) {
      console.log("Backdoor de pruebas registrado en .header");
      headerEl.addEventListener('dblclick', () => {
        console.log("Doble clic detectado en la cabecera.");
        showToast("🧪 Modo prueba: Lanzando screamer...");
        triggerScreamer();
      });
    } else {
      console.error("No se encontró el elemento .header para registrar el backdoor.");
    }

    // Screamer Close Listeners
    document.getElementById('screamerOverlay').addEventListener('click', () => {
      const overlay = document.getElementById('screamerOverlay');
      const video = document.getElementById('screamerVideo');
      video.pause();
      overlay.style.display = 'none';
    });
    
    document.getElementById('screamerVideo').addEventListener('ended', () => {
      const overlay = document.getElementById('screamerOverlay');
      overlay.style.display = 'none';
    });
  </script>
</body>
</html>
